<div class="sharpsplat-tab-root">
    <div class="sharpsplat-sidebar">
        <!-- Settings accordion -->
        <div class="sharpsplat-accordion" id="sharpsplat_acc_settings">
            <button class="sharpsplat-accordion-header" id="sharpsplat_acc_settings_btn">
                <span class="sharpsplat-accordion-arrow">&#9654;</span> Settings
            </button>
            <div class="sharpsplat-accordion-body">
                <div class="sharpsplat-settings-row">
                    <label class="sharpsplat-settings-label" for="sharpsplat_setting_auto_navigate">Open in viewer after generation</label>
                    <label class="sharpsplat-toggle">
                        <input type="checkbox" id="sharpsplat_setting_auto_navigate">
                        <span class="sharpsplat-toggle-slider"></span>
                    </label>
                </div>
                <div class="sharpsplat-settings-row">
                    <label class="sharpsplat-settings-label" for="sharpsplat_setting_model">Reconstruction model</label>
                    <select class="sharpsplat-settings-select" id="sharpsplat_setting_model">
                        <option value="mlsharp">ml-sharp</option>
                        <option value="vggt">VGGT</option>
                        <option value="instantsplat">InstantSplat</option>
                    </select>
                </div>
                <div class="sharpsplat-settings-row sharpsplat-vggt-only" id="sharpsplat_row_pad_to_square" style="display:none">
                    <label class="sharpsplat-settings-label" for="sharpsplat_setting_pad_to_square">Pad images to square</label>
                    <label class="sharpsplat-toggle">
                        <input type="checkbox" id="sharpsplat_setting_pad_to_square">
                        <span class="sharpsplat-toggle-slider"></span>
                    </label>
                </div>
                <div class="sharpsplat-settings-row">
                    <label class="sharpsplat-settings-label" for="sharpsplat_setting_output_format">Output format</label>
                    <select class="sharpsplat-settings-select" id="sharpsplat_setting_output_format">
                        <option value="ply">PLY</option>
                        <option value="splat">SPLAT</option>
                    </select>
                </div>
                <div class="sharpsplat-settings-row">
                    <label class="sharpsplat-settings-label" for="sharpsplat_setting_repair_prompt">Generate Repair Prompt button</label>
                    <label class="sharpsplat-toggle">
                        <input type="checkbox" id="sharpsplat_setting_repair_prompt">
                        <span class="sharpsplat-toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
        <!-- Input accordion -->
        <div class="sharpsplat-accordion" id="sharpsplat_acc_input">
            <button class="sharpsplat-accordion-header" id="sharpsplat_acc_input_btn">
                <span class="sharpsplat-accordion-arrow">&#9654;</span> Input Image
            </button>
            <div class="sharpsplat-accordion-body">
                <div class="sharpsplat-input-wrap">
                    <div class="sharpsplat-dropzone" id="sharpsplat_dropzone">
                        <div class="sharpsplat-dropzone-main" id="sharpsplat_dropzone_main">Drop a single image here</div>
                        <div class="sharpsplat-dropzone-sub" id="sharpsplat_dropzone_sub">or click Browse to select</div>
                        <input type="file" id="sharpsplat_input_file" accept="image/*" hidden>
                    </div>
                    <div class="sharpsplat-input-controls">
                        <button class="basic-button" id="sharpsplat_input_browse">Browse</button>
                        <button class="basic-button" id="sharpsplat_input_clear">Clear</button>
                    </div>
                    <div class="sharpsplat-input-preview" id="sharpsplat_input_preview_wrap">
                        <img class="sharpsplat-input-preview-image" id="sharpsplat_input_preview" alt="Selected input preview">
                    </div>
                    <div class="sharpsplat-input-name" id="sharpsplat_input_name">No image selected.</div>
                    <button class="basic-button" id="sharpsplat_generate_btn" disabled>Generate Splat</button>
                </div>
            </div>
        </div>
        <!-- Camera accordion -->
        <div class="sharpsplat-accordion" id="sharpsplat_acc_camera">
            <button class="sharpsplat-accordion-header" id="sharpsplat_acc_camera_btn">
                <span class="sharpsplat-accordion-arrow">&#9654;</span> Camera
            </button>
            <div class="sharpsplat-accordion-body">
                <div class="sharpsplat-camera-controls">
                    <div class="sharpsplat-camera-group">
                        <div class="sharpsplat-camera-group-label">Camera Position</div>
                        <div class="sharpsplat-camera-row">
                            <label class="sharpsplat-camera-label">X</label>
                            <input class="sharpsplat-camera-input" type="number" id="sharpsplat_cam_x" step="0.1" value="0">
                        </div>
                        <div class="sharpsplat-camera-row">
                            <label class="sharpsplat-camera-label">Y</label>
                            <input class="sharpsplat-camera-input" type="number" id="sharpsplat_cam_y" step="0.1" value="0">
                        </div>
                        <div class="sharpsplat-camera-row">
                            <label class="sharpsplat-camera-label">Z</label>
                            <input class="sharpsplat-camera-input" type="number" id="sharpsplat_cam_z" step="0.1" value="1">
                        </div>
                    </div>
                    <div class="sharpsplat-camera-group">
                        <div class="sharpsplat-camera-group-label">Look At</div>
                        <div class="sharpsplat-camera-row">
                            <label class="sharpsplat-camera-label">X</label>
                            <input class="sharpsplat-camera-input" type="number" id="sharpsplat_cam_lx" step="0.1" value="0">
                        </div>
                        <div class="sharpsplat-camera-row">
                            <label class="sharpsplat-camera-label">Y</label>
                            <input class="sharpsplat-camera-input" type="number" id="sharpsplat_cam_ly" step="0.1" value="0">
                        </div>
                        <div class="sharpsplat-camera-row">
                            <label class="sharpsplat-camera-label">Z</label>
                            <input class="sharpsplat-camera-input" type="number" id="sharpsplat_cam_lz" step="0.1" value="0">
                        </div>
                    </div>
                    <div class="sharpsplat-settings-row">
                        <label class="sharpsplat-settings-label" for="sharpsplat_setting_invert_controls">Invert orbital controls</label>
                        <label class="sharpsplat-toggle">
                            <input type="checkbox" id="sharpsplat_setting_invert_controls">
                            <span class="sharpsplat-toggle-slider"></span>
                        </label>
                    </div>
                    <div class="sharpsplat-camera-btns">
                        <button class="basic-button" id="sharpsplat_cam_apply">Apply</button>
                        <button class="basic-button" id="sharpsplat_cam_reset">Reset Camera</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Export Canvas accordion -->
        <div class="sharpsplat-accordion" id="sharpsplat_acc_export">
            <button class="sharpsplat-accordion-header" id="sharpsplat_acc_export_btn">
                <span class="sharpsplat-accordion-arrow">&#9654;</span> Export Canvas
            </button>
            <div class="sharpsplat-accordion-body">
                <div class="sharpsplat-export-wrap">
                    <button class="basic-button" id="sharpsplat_export_btn">Export Canvas</button>
                    <button class="basic-button sharpsplat-repair-prompt-btn" id="sharpsplat_repair_prompt_btn" style="display:none">Generate Repair Prompt</button>
                    <!-- Shown only during export mode -->
                    <div id="sharpsplat_export_actions" style="display:none">
                        <div class="sharpsplat-settings-row">
                            <label class="sharpsplat-settings-label" for="sharpsplat_export_resolution">Resolution</label>
                            <select class="sharpsplat-settings-select" id="sharpsplat_export_resolution">
                                <option value="none">None (Full)</option>
                                <option value="1:1">1:1</option>
                                <option value="4:3">4:3</option>
                                <option value="3:2">3:2</option>
                                <option value="8:5">8:5</option>
                                <option value="16:9">16:9</option>
                                <option value="21:9">21:9</option>
                                <option value="3:4">3:4</option>
                                <option value="2:3">2:3</option>
                                <option value="5:8">5:8</option>
                                <option value="9:16">9:16</option>
                                <option value="9:21">9:21</option>
                                <option value="custom">Custom</option>
                            </select>
                        </div>
                        <div class="sharpsplat-export-custom" id="sharpsplat_export_custom_dims" style="display:none">
                            <div class="sharpsplat-camera-row">
                                <label class="sharpsplat-camera-label">W</label>
                                <input class="sharpsplat-camera-input" type="number" id="sharpsplat_export_custom_w" min="1" step="1" value="1920">
                            </div>
                            <div class="sharpsplat-camera-row">
                                <label class="sharpsplat-camera-label">H</label>
                                <input class="sharpsplat-camera-input" type="number" id="sharpsplat_export_custom_h" min="1" step="1" value="1080">
                            </div>
                        </div>
                        <button class="basic-button" id="sharpsplat_export_save_btn">Save to Outputs</button>
                        <button class="basic-button" id="sharpsplat_export_download_btn">Download</button>
                        <button class="basic-button sharpsplat-export-cancel-btn" id="sharpsplat_export_cancel_btn">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Splats accordion -->
        <div class="sharpsplat-accordion sharpsplat-accordion-flex" id="sharpsplat_acc_splats">
            <button class="sharpsplat-accordion-header" id="sharpsplat_acc_splats_btn">
                <span class="sharpsplat-accordion-arrow">&#9654;</span> Splats
                <button class="sharpsplat-acc-action-btn" id="sharpsplat_refresh_btn" title="Refresh list">&#8635;</button>
            </button>
            <div class="sharpsplat-accordion-body sharpsplat-accordion-body-flex">
                <div class="sharpsplat-file-list" id="sharpsplat_file_list">
                    <span class="sharpsplat-hint">No splats generated yet.</span>
                </div>
            </div>
        </div>
    </div>
    <div class="sharpsplat-viewer-panel">
        <div class="sharpsplat-viewer-status" id="sharpsplat_status">
            Select a splat from the list, or click &ldquo;Generate 3D Splat&rdquo; on an image in the Generate tab.
        </div>
        <div class="sharpsplat-canvas-wrap" id="sharpsplat_canvas_wrap"></div>
        <!-- Export crop indicator — shown over the canvas during export mode.
             Kept outside canvas-wrap because wrap.innerHTML is cleared on each splat load. -->
        <div class="sharpsplat-export-overlay" id="sharpsplat_export_overlay" style="display:none" aria-hidden="true">
            <div class="sharpsplat-export-viewport" id="sharpsplat_export_viewport">
                <div class="sharpsplat-export-viewport-box" id="sharpsplat_export_viewport_box"></div>
            </div>
        </div>
        <!-- Toast notification container -->
        <div class="sharpsplat-toast-container" id="sharpsplat_toast_container" aria-live="polite"></div>
    </div>
</div>
